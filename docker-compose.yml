version: '3.9'

services:

  postgres:
    image: postgres:16

    container_name: surveillance_postgres

    environment:
      POSTGRES_DB: surveillance
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: